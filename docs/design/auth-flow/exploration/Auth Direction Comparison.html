<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AssetAnchor — Auth SignIn 視覺方向比較（並排）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #07090E; color: #fff; }
  .num { font-family: 'Nunito', system-ui, sans-serif; font-variant-numeric: tabular-nums; }
  .aa-field { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 12px 14px; min-height: 46px; }
  .aa-ghost { width: 100%; padding: 13px 0; border-radius: 13px; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 700; font-family: inherit; transition: background .14s; }
  .aa-ghost:hover { background: rgba(255,255,255,0.07); }
  .wrap { max-width: 1560px; margin: 0 auto; padding: 44px 40px 80px; }
  .sec-title { font-size: 22px; font-weight: 800; letter-spacing: .01em; }
  .sec-sub { font-size: 13.5px; font-weight: 500; color: rgba(255,255,255,0.5); margin-top: 8px; line-height: 1.6; max-width: 920px; }
  .row { display: flex; flex-wrap: wrap; gap: 36px; margin-top: 30px; }
  .item { display: flex; flex-direction: column; gap: 14px; }
  .cap { font-size: 13.5px; font-weight: 700; color: rgba(255,255,255,0.85); }
  .cap small { display: block; font-weight: 500; color: rgba(255,255,255,0.45); margin-top: 4px; font-size: 12.5px; }
  .note { margin-top: 14px; display: inline-flex; align-items: flex-start; gap: 10px; background: rgba(124,108,240,0.12); border: 1px solid rgba(124,108,240,0.3); border-radius: 14px; padding: 14px 18px; font-size: 13.5px; line-height: 1.6; color: rgba(255,255,255,0.82); max-width: 940px; }
  .note b { color: #B7AEFF; }
  hr.div { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 56px 0; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="auth-shared.jsx"></script>
<script type="text/babel" src="auth-directions.jsx"></script>

<script type="text/babel">
function Item({ label, sub, children }) {
  return (
    <div className="item">
      <div className="cap">{label}{sub && <small>{sub}</small>}</div>
      {children}
    </div>
  );
}
function App() {
  return (
    <React.Fragment>
      <div className="sec-title">SignIn 視覺方向</div>
      <div className="sec-sub">三個方向皆沿用既有 tokens（accent #7C6CF0 · Nunito + Noto Sans TC · aa-field · 克制光暈）。表單內容相同：Email + 密碼、Google 登入、忘記密碼、註冊入口。標誌目前都先套「款 2 圓環錨點」展示。</div>
      <div className="row">
        <Item label="A · 錨定置中" sub="品牌光暈主視覺、經典對稱"><DirA /></Item>
        <Item label="B · 資產氛圍" sub="走勢光暈品牌區 + 浮卡表單"><DirB /></Item>
        <Item label="C · 編輯式極簡" sub="左對齊大標、行動區沉底"><DirC /></Item>
      </div>
      <div className="note"><span>💡</span><span>我的建議：<b>方向 B</b>（與 app 內卡片語言最連貫、品牌區日後可放真實組合走勢）＋ <b>款 2 標誌</b>（縮到 tab bar / splash 都穩）。方向與標誌可分開挑，也可混搭再調。</span></div>
      <hr className="div" />
      <div className="sec-title">AssetAnchor 標誌提案</div>
      <div className="sec-sub">與方向獨立選擇；定稿後全 app 共用（splash / 設定 / 關於頁）。</div>
      <div className="row">
        <Item label="款 1 · A 即是錨"><LogoCard variant="A" title="A 即是錨" desc="字母 A 的兩腿外捲成錨爪、橫槓即錨桿、頂上錨環" /></Item>
        <Item label="款 2 · 圓環錨點"><LogoCard variant="B" title="圓環錨點" desc="經典錨形的幾何精煉，辨識度最直接、縮小仍清楚" /></Item>
        <Item label="款 3 · 錨定上升"><LogoCard variant="C" title="錨定上升" desc="走勢線自錨點環向上，金融語意最強" /></Item>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
