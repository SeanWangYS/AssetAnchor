<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AssetAnchor — 高保真 Prototype v2（含分析頁）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(900px 500px at 50% -8%, rgba(124,108,240,0.12), transparent 62%),
      radial-gradient(700px 500px at 100% 100%, rgba(76,111,232,0.07), transparent 60%),
      #0A0C10;
    color: #fff;
    font-family: 'Noto Sans TC', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #root { --aa: #7C6CF0; --num-font: 'Nunito', system-ui, sans-serif; }
  .num { font-family: var(--num-font); font-variant-numeric: tabular-nums; }

  /* ---- phone ---- */
  .aa-phone {
    width: 390px; height: 822px; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    border-radius: 42px;
    background:
      radial-gradient(420px 280px at 50% -6%, color-mix(in srgb, var(--aa) 16%, transparent), transparent 70%),
      #0E1117;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 40px 90px -40px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.02) inset, 0 1px 0 rgba(255,255,255,0.07) inset;
  }

  /* ---- cards / rows ---- */
  .aa-card { transition: transform .14s, box-shadow .2s; }
  .aa-card[role="button"], .aa-card[onclick] { cursor: pointer; }
  .aa-row { transition: background .12s; border-radius: 10px; }
  .aa-row:hover { background: rgba(255,255,255,0.045); }
  .aa-row:active { background: rgba(255,255,255,0.07); }

  /* ---- push screen ---- */
  .aa-push {
    position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column;
    background: radial-gradient(420px 260px at 50% -6%, color-mix(in srgb, var(--aa) 14%, transparent), transparent 70%), #0E1117;
    animation: aaPush .3s cubic-bezier(.2,.7,.25,1);
  }
  @keyframes aaPush { from { transform: translateX(36px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ---- bottom sheet ---- */
  .aa-scrim {
    position: absolute; inset: 0; z-index: 40; background: rgba(0,0,0,0.55); backdrop-filter: blur(2px);
    display: flex; flex-direction: column; justify-content: flex-end; animation: aaFade .2s ease;
  }
  @keyframes aaFade { from { opacity: 0; } to { opacity: 1; } }
  .aa-sheet {
    background: linear-gradient(180deg, #13161d, #0F1218);
    border-top-left-radius: 26px; border-top-right-radius: 26px;
    border-top: 1px solid rgba(255,255,255,0.10);
    padding: 10px 20px 24px; max-height: 90%; overflow-y: auto;
    box-shadow: 0 -20px 50px -20px rgba(0,0,0,0.7);
    animation: aaUp .32s cubic-bezier(.2,.8,.22,1);
  }
  @keyframes aaUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .aa-handle { width: 40px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.22); margin: 4px auto 14px; }

  /* ---- fields ---- */
  .aa-field {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 12px 14px; min-height: 46px;
  }
  .aa-input {
    background: transparent; border: none; outline: none; color: rgba(255,255,255,0.95);
    font-size: 14px; font-weight: 700; width: 100%; min-width: 0; padding: 0;
  }
  .aa-ghost {
    width: 100%; padding: 13px 0; border-radius: 13px; cursor: pointer;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 700; font-family: inherit;
    transition: background .14s;
  }
  .aa-ghost:hover { background: rgba(255,255,255,0.07); }

  /* ---- toast ---- */
  .aa-toast {
    position: absolute; bottom: 88px; left: 50%; transform: translateX(-50%); z-index: 60;
    background: rgba(20,23,30,0.96); border: 1px solid rgba(255,255,255,0.14); color: #fff;
    padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; white-space: nowrap;
    box-shadow: 0 16px 40px -16px rgba(0,0,0,0.8); animation: aaToast .25s ease;
  }
  @keyframes aaToast { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ---- auth: spinner + splash ---- */
  .aa-spin { width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.38); border-top-color: #fff; animation: aaspin .7s linear infinite; }
  @keyframes aaspin { to { transform: rotate(360deg); } }
  @keyframes aaSplashIn { from { opacity: 0; transform: translateY(10px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes aaDot { 0%,100% { opacity: 0.25; transform: translateY(0); } 50% { opacity: 0.9; transform: translateY(-3px); } }

  /* ---- scrollbars ---- */
  .aa-scroll::-webkit-scrollbar { width: 0; }
  .aa-phone *::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
