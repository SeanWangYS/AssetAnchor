name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # pnpm 版本由 package.json 的 packageManager 欄位提供（pnpm/action-setup 自動讀取）。
  NODE_VERSION: 22

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm -r lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @assetanchor/shared test:coverage
      # ADR-0007 §3：mobile 純邏輯測試進 CI（純函式不依賴 RNFB native；
      # jest.config 的 path-glob coverageThreshold 只 gate 純邏輯檔）。
      - run: pnpm --filter @assetanchor/mobile test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: shared-coverage
          path: packages/shared/coverage/
          retention-days: 7

  # ADR-0007 §3：Firestore rules 隔離測試以 emulator 跑進 CI（原為缺口）。
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      # firebase-tools（每次裝最新版）的 Firestore emulator 要求 JDK >= 21
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      - run: npm install -g firebase-tools
      - run: pnpm --filter @assetanchor/firebase test:rules
