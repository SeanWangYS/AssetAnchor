name: Bug Report
description: Report a defect in AssetAnchor
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug + steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - apps/mobile
        - apps/functions
        - packages/shared
        - firebase rules / indexes
        - infra (CI / tooling)
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Env (iOS / Android / version / etc.)
